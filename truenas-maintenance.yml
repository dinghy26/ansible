---
# =============================================================================
# TrueNAS Simple Maintenance Playbook
# =============================================================================
# Connects via SSH directly to TrueNAS (like any normal Linux server).
# Runs health checks, updates, and reboots if needed.
#
# Usage:
#   ansible-playbook truenas-simple.yml -i inventory.yml
#   ansible-playbook truenas-simple.yml -i inventory.yml --tags health
#   ansible-playbook truenas-simple.yml -i inventory.yml --tags update
# =============================================================================

- name: TrueNAS Simple Maintenance
  hosts: truenas
  gather_facts: true
  become: true

  vars:
    allow_reboot: true
    reboot_timeout: 300

  tasks:

  # ---------------------------------------------------------------------------
  # HEALTH CHECKS
  # ---------------------------------------------------------------------------

    - name: "=== SYSTEM INFO ==="
      ansible.builtin.debug:
        msg: "Connected to {{ inventory_hostname }} ({{ ansible_host }})"
      tags: [health, always]

    - name: "[HEALTH] Get TrueNAS version"
      ansible.builtin.command: cat /etc/version
      register: truenas_version
      changed_when: false
      failed_when: false
      tags: [health, always]

    - name: "[HEALTH] Display version"
      ansible.builtin.debug:
        msg: "TrueNAS Version: {{ truenas_version.stdout | default('Unable to read version') }}"
      tags: [health, always]

    - name: "[HEALTH] Check disk usage"
      ansible.builtin.shell: df -h | grep -v tmpfs
      register: disk_usage
      changed_when: false
      tags: health

    - name: "[HEALTH] Display disk usage"
      ansible.builtin.debug:
        msg: "{{ disk_usage.stdout_lines }}"
      tags: health

    - name: "[HEALTH] Check memory usage"
      ansible.builtin.shell: free -h
      register: mem_usage
      changed_when: false
      tags: health

    - name: "[HEALTH] Display memory"
      ansible.builtin.debug:
        msg: "{{ mem_usage.stdout_lines }}"
      tags: health

    - name: "[HEALTH] Check ZFS pool status"
      ansible.builtin.command: zpool status
      register: zpool_status
      changed_when: false
      failed_when: false
      tags: health

    - name: "[HEALTH] Display ZFS pool status"
      ansible.builtin.debug:
        msg: "{{ zpool_status.stdout_lines }}"
      tags: health

    - name: "[HEALTH] Warn on degraded pools"
      ansible.builtin.debug:
        msg: "WARNING: Pool issue detected - check zpool status output above!"
      when: "'DEGRADED' in zpool_status.stdout or 'FAULTED' in zpool_status.stdout"
      tags: health

    - name: "[HEALTH] Check ZFS pool space"
      ansible.builtin.command: zpool list
      register: zpool_list
      changed_when: false
      failed_when: false
      tags: health

    - name: "[HEALTH] Display ZFS pool space"
      ansible.builtin.debug:
        msg: "{{ zpool_list.stdout_lines }}"
      tags: health

    - name: "[HEALTH] Check system load"
      ansible.builtin.command: uptime
      register: sys_uptime
      changed_when: false
      tags: health

    - name: "[HEALTH] Display uptime and load"
      ansible.builtin.debug:
        msg: "{{ sys_uptime.stdout }}"
      tags: health

    - name: "[HEALTH] Check active alerts via CLI"
      ansible.builtin.shell: midclt call alert.list 2>/dev/null | python3 -c "
import sys, json
alerts = json.load(sys.stdin)
if not alerts:
    print('No active alerts')
else:
    for a in alerts:
        print(f\"[{a.get('level','?')}] {a.get('formatted','') or a.get('text','Unknown alert')}\")
" || echo "Could not retrieve alerts"
      register: alert_list
      changed_when: false
      failed_when: false
      tags: health

    - name: "[HEALTH] Display alerts"
      ansible.builtin.debug:
        msg: "{{ alert_list.stdout_lines }}"
      tags: health

    - name: "[HEALTH] Check key TrueNAS services"
      ansible.builtin.shell: |
        for svc in middlewared nginx; do
          status=$(systemctl is-active $svc 2>/dev/null || echo "not-found")
          echo "$svc: $status"
        done
      register: svc_status
      changed_when: false
      failed_when: false
      tags: health

    - name: "[HEALTH] Display service status"
      ansible.builtin.debug:
        msg: "{{ svc_status.stdout_lines }}"
      tags: health

  # ---------------------------------------------------------------------------
  # UPDATES
  # ---------------------------------------------------------------------------

    - name: "=== CHECKING FOR UPDATES ==="
      ansible.builtin.debug:
        msg: "Checking for TrueNAS system updates..."
      tags: update

    - name: "[UPDATE] Check for available update via midclt"
      ansible.builtin.shell: |
        midclt call update.check_available 2>/dev/null | python3 -c "
import sys, json
result = json.load(sys.stdin)
status = result.get('status', 'UNKNOWN')
version = result.get('version', '')
print(f'STATUS={status}')
if version:
    print(f'VERSION={version}')
" || echo "STATUS=CHECK_FAILED"
      register: update_check
      changed_when: false
      failed_when: false
      tags: update

    - name: "[UPDATE] Display update check result"
      ansible.builtin.debug:
        msg: "{{ update_check.stdout_lines }}"
      tags: update

    - name: "[UPDATE] Apply update if available"
      ansible.builtin.shell: |
        midclt call update.update '{"reboot": false}' 2>/dev/null && echo "UPDATE_STARTED" || echo "UPDATE_FAILED"
      register: update_result
      when: "'STATUS=AVAILABLE' in update_check.stdout"
      async: 1800
      poll: 30
      changed_when: "'UPDATE_STARTED' in update_result.stdout | default('')"
      failed_when: "'UPDATE_FAILED' in update_result.stdout | default('')"
      tags: update

    - name: "[UPDATE] Display update result"
      ansible.builtin.debug:
        msg: "{{ update_result.stdout | default('No update was applied') }}"
      tags: update

    - name: "[UPDATE] No update needed"
      ansible.builtin.debug:
        msg: "System is already up to date - nothing to do."
      when: "'STATUS=AVAILABLE' not in update_check.stdout"
      tags: update

  # ---------------------------------------------------------------------------
  # REBOOT IF NEEDED
  # ---------------------------------------------------------------------------

    - name: "=== REBOOT CHECK ==="
      ansible.builtin.debug:
        msg: "Checking if reboot is required..."
      tags: reboot

    - name: "[REBOOT] Check if update requires reboot"
      ansible.builtin.set_fact:
        needs_reboot: "{{ 'STATUS=AVAILABLE' in update_check.stdout and update_result is defined and update_result.changed | default(false) }}"
      tags: reboot

    - name: "[REBOOT] Skip — no reboot needed"
      ansible.builtin.debug:
        msg: "No reboot required."
      when: not needs_reboot | bool
      tags: reboot

    - name: "[REBOOT] Skip — reboots disabled"
      ansible.builtin.debug:
        msg: "Reboot needed but allow_reboot is false. Please reboot manually."
      when:
        - needs_reboot | bool
        - not allow_reboot | bool
      tags: reboot

    - name: "[REBOOT] Reboot TrueNAS"
      ansible.builtin.reboot:
        msg: "Ansible maintenance reboot after update"
        pre_reboot_delay: 10
        reboot_timeout: "{{ reboot_timeout }}"
        post_reboot_delay: 30
        connect_timeout: 30
      when:
        - needs_reboot | bool
        - allow_reboot | bool
      tags: reboot

    - name: "[REBOOT] Confirm back online"
      ansible.builtin.debug:
        msg: "TrueNAS {{ inventory_hostname }} is back online."
      when:
        - needs_reboot | bool
        - allow_reboot | bool
      tags: reboot

  # ---------------------------------------------------------------------------
  # FINAL SUMMARY
  # ---------------------------------------------------------------------------

    - name: "=== FINAL SUMMARY ==="
      ansible.builtin.debug:
        msg: |
          ==============================
          TrueNAS Maintenance Complete
          ==============================
          Host    : {{ inventory_hostname }}
          Version : {{ truenas_version.stdout | default('N/A') }}
          Uptime  : {{ sys_uptime.stdout | default('N/A') }}
          Updated : {{ 'Yes' if (update_result is defined and update_result.changed | default(false)) else 'No' }}
          Rebooted: {{ 'Yes' if (needs_reboot | bool and allow_reboot | bool) else 'No' }}
          ==============================
      tags: always