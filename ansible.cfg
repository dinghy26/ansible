[defaults]
# =============================================================================
# ansible.cfg — Place this in the SAME directory as your playbook in Semaphore
# This prevents Semaphore from forcing SSH on API-based playbooks
# =============================================================================

# Use local connection by default for this project
transport = local

# Don't gather facts via SSH (TrueNAS playbook uses API only)
gathering = explicit

# Suppress warnings about localhost usage
localhost_warning = false

# Retry files clutter — disable
retry_files_enabled = false

# Faster stdout for Semaphore logs
stdout_callback = yaml

[ssh_connection]
# Even if SSH is attempted, don't hang — fail fast
ssh_args = -o ConnectTimeout=5 -o BatchMode=yes
pipelining = false